# Friday AI Assistant Configuration - Example
# Copy this file to config.yaml and fill in your values

cloud:
  server_url: "http://localhost:8000"
  username: "your_username"
  password: "your_password"

audio:
  wake_word: "friday"
  porcupine_access_key: "your-porcupine-access-key"  # Get from https://picovoice.ai/
  sample_rate: 16000
  vad_aggressiveness: 2
  silence_duration: 1.5
  min_recording_duration: 0.5
  max_recording_duration: 30.0

tts:
  model_path: "/path/to/piper/model.onnx"
  speaker_id: 0
  length_scale: 1.0

stt:
  model_size: "base"
  device: "cpu"
  compute_type: "int8"

llm:
  model: "llama3.2"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 2048

hotkey: "ctrl+shift+f"
log_level: "INFO"
log_file: ""
