version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: friday-db
    environment:
      POSTGRES_USER: friday
      POSTGRES_PASSWORD: friday
      POSTGRES_DB: friday
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friday"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: friday-api
    environment:
      DATABASE_URL: postgresql+asyncpg://friday:friday@db:5432/friday
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
